version: "3.9"

services:
  web:
    build:
      context: ../..
      dockerfile: infra/podman/Containerfile.web
    container_name: hub-estudiantil-web
    working_dir: /workspace/apps/web
    ports:
      - "${WEB_PORT:-5173}:5173"
    environment:
      VITE_API_URL: "http://localhost:${API_PORT:-3000}/api"
      VITE_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
    volumes:
      - ../../apps/web:/workspace/apps/web
      - web_node_modules:/workspace/apps/web/node_modules
    depends_on:
      - api

  api:
    build:
      context: ../..
      dockerfile: infra/podman/Containerfile.api
    container_name: hub-estudiantil-api
    working_dir: /workspace/apps/api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      PORT: 3000
      DATABASE_URL: "postgresql://${POSTGRES_USER:-hub_user}:${POSTGRES_PASSWORD:-hub_password}@postgres:5432/${POSTGRES_DB:-hub_estudiantil}"
      DB_SSL: "false"
      DB_POOL_MAX: 10
      DB_IDLE_TIMEOUT_MS: 30000
      DB_CONNECTION_RETRIES: 25
      DB_CONNECTION_RETRY_DELAY_MS: 2000
      VALKEY_URL: "redis://valkey:6379"
      VALKEY_KEY_PREFIX: "${VALKEY_KEY_PREFIX:-hub-estudiantil}"
      VALKEY_DEFAULT_TTL_SECONDS: "${VALKEY_DEFAULT_TTL_SECONDS:-300}"
      VALKEY_CONNECTION_RETRIES: "${VALKEY_CONNECTION_RETRIES:-25}"
      VALKEY_CONNECTION_RETRY_DELAY_MS: "${VALKEY_CONNECTION_RETRY_DELAY_MS:-2000}"
      JWT_SECRET: "${JWT_SECRET:-change_this_secret}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
    volumes:
      - ../../apps/api:/workspace/apps/api
      - api_node_modules:/workspace/apps/api/node_modules
    depends_on:
      - postgres
      - valkey

  db-init:
    build:
      context: ../..
      dockerfile: infra/podman/Containerfile.api
    container_name: hub-estudiantil-db-init
    working_dir: /workspace/apps/api
    environment:
      PORT: 3000
      DATABASE_URL: "postgresql://${POSTGRES_USER:-hub_user}:${POSTGRES_PASSWORD:-hub_password}@postgres:5432/${POSTGRES_DB:-hub_estudiantil}"
      DB_SSL: "false"
      DB_POOL_MAX: 10
      DB_IDLE_TIMEOUT_MS: 30000
      DB_CONNECTION_RETRIES: 25
      DB_CONNECTION_RETRY_DELAY_MS: 2000
      VALKEY_URL: "redis://valkey:6379"
      VALKEY_KEY_PREFIX: "${VALKEY_KEY_PREFIX:-hub-estudiantil}"
      VALKEY_DEFAULT_TTL_SECONDS: "${VALKEY_DEFAULT_TTL_SECONDS:-300}"
      VALKEY_CONNECTION_RETRIES: "${VALKEY_CONNECTION_RETRIES:-25}"
      VALKEY_CONNECTION_RETRY_DELAY_MS: "${VALKEY_CONNECTION_RETRY_DELAY_MS:-2000}"
      JWT_SECRET: "${JWT_SECRET:-change_this_secret}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
    volumes:
      - ../../apps/api:/workspace/apps/api
      - api_node_modules:/workspace/apps/api/node_modules
    depends_on:
      - postgres
    command: ["npm", "run", "db:setup"]
    restart: "no"

  postgres:
    image: docker.io/postgres:16-alpine
    container_name: hub-estudiantil-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-hub_estudiantil}"
      POSTGRES_USER: "${POSTGRES_USER:-hub_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-hub_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: docker.io/valkey/valkey:7-alpine
    container_name: hub-estudiantil-valkey
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    volumes:
      - valkey_data:/data

volumes:
  web_node_modules:
  api_node_modules:
  postgres_data:
  valkey_data:
